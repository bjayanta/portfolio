{% extends 'layout.html' %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-12">
            <h2>Contact edit page</h2>

            <form action="/contact/?id={{ record.id }}&method=edit" method="POST">
                {% csrf_token %}

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="name">Your name</label>
                        <input type="text" name="name" value="{{ record.name }}" class="form-control" id="name">
                    </div>

                    <div class="form-group col-md-6">
                        <label for="email">Email address</label>
                        <input type="email" name="email" value="{{ record.email }}" class="form-control" id="email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" name="address" value="{{ record.address }}" class="form-control" id="address">
                </div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="city">City</label>
                        <input type="text" name="city" value="{{ record.city }}" class="form-control" id="city">
                    </div>

                    <div class="form-group col-md-6">
                        <label for="zipcode">Zipcode</label>
                        <input type="text" name="zipcode" value="{{ record.zipcode }}" class="form-control" id="zipcode">
                    </div>
                </div>

                <div class="text-right">
                    <button type="reset" class="btn btn-danger">Reset</button>
                    <button type="submit" class="btn btn-primary">Save changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
